name: Update Active Days Badge

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Count active GitHub days and update badge
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, re, os

          token = os.environ["GITHUB_TOKEN"]
          username = "kodinandan123-stack"

          # Use GitHub GraphQL to get contribution calendar
          query = """
          {
            user(login: "%s") {
              contributionsCollection {
                contributionCalendar {
                  weeks {
                    contributionDays {
                      contributionCount
                      date
                    }
                  }
                }
              }
            }
          }
          """ % username

          payload = json.dumps({"query": query}).encode()
          req = urllib.request.Request(
              "https://api.github.com/graphql",
              data=payload,
              headers={
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json",
                  "User-Agent": "python"
              }
          )
          with urllib.request.urlopen(req) as r:
              data = json.loads(r.read())

          weeks = data["data"]["user"]["contributionsCollection"]["contributionCalendar"]["weeks"]
          active_days = sum(
              1 for week in weeks
              for day in week["contributionDays"]
              if day["contributionCount"] > 0
          )

          print(f"Active contribution days: {active_days}")

          label = f"{active_days}%20days"

          with open("README.md", "r") as f:
              content = f.read()

          new_content = re.sub(
              r"/badge/Last%20Commit%20.Finance%20Tracker.-[^-]+-green",
              f"/badge/Last%20Commit%20(Finance%20Tracker)-{label}-green",
              content
          )

          if new_content != content:
              with open("README.md", "w") as f:
                  f.write(new_content)
              print(f"Updated badge to: {active_days} days")
          else:
              print("No change needed")
          PYEOF

          if git diff --quiet README.md; then
            echo "Badge already up to date"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore: update active days badge"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
