name: Update Commit Days Badge

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Calculate days and update badge
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, re
          from datetime import date

          url = "https://api.github.com/repos/kodinandan123-stack/Personal-Finance-Tracker/commits?per_page=100&sha=main"
          req = urllib.request.Request(url, headers={"Accept": "application/vnd.github.v3+json", "User-Agent": "python"})
          with urllib.request.urlopen(req) as r:
              commits = json.loads(r.read())

          first_date_str = commits[-1]["commit"]["committer"]["date"]
          first_date = date.fromisoformat(first_date_str[:10])
          today = date.today()
          days = (today - first_date).days

          print(f"First commit: {first_date}, Today: {today}, Days: {days}")

          label = f"{days}%20days" if days != 1 else "1%20day"

          with open("README.md", "r") as f:
              content = f.read()

          new_content = re.sub(
              r"/badge/Last%20Commit%20.Finance%20Tracker.-[^-]+-green",
              f"/badge/Last%20Commit%20(Finance%20Tracker)-{label}-green",
              content
          )

          if new_content != content:
              with open("README.md", "w") as f:
                  f.write(new_content)
              print(f"Updated badge to: {days} days")
          else:
              print("No change needed")
          PYEOF

          if git diff --quiet README.md; then
            echo "Badge already up to date"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore: update commit days badge"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
