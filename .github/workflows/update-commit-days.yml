name: Update Commit Days Badge

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Get last commit date and update badge
        run: |
          # Get the last commit date of Personal-Finance-Tracker
          LAST_COMMIT=$(curl -s "https://api.github.com/repos/kodinandan123-stack/Personal-Finance-Tracker/commits?per_page=1" | python3 -c "import sys, json; data = json.load(sys.stdin); print(data[0]['commit']['committer']['date'])" 2>/dev/null || echo "")

          if [ -z "$LAST_COMMIT" ]; then
            echo "Could not get last commit date"
            exit 0
          fi

          # Calculate days since last commit
          LAST_TS=$(date -d "$LAST_COMMIT" +%s)
          NOW_TS=$(date +%s)
          DAYS=$(( (NOW_TS - LAST_TS) / 86400 ))

          if [ "$DAYS" -eq 1 ]; then
            LABEL="1%20day"
          else
            LABEL="${DAYS}%20days"
          fi

          echo "Days since last commit: $DAYS"

          # Update README.md badge
          sed -i 's|/badge/Last%20Commit%20(Finance%20Tracker)-[^-]*-green|/badge/Last%20Commit%20(Finance%20Tracker)-'"$LABEL"'-green|g' README.md

          # Check if file changed
          if git diff --quiet README.md; then
            echo "No changes needed"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore: update commit days badge to ${DAYS} day(s)"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
